    <title>lullicat musics</title>
    <style>
        /* reset css */
        * {
            margin: 0;
            padding: 0;
        }
        ul {
            list-style-type: none;
        }
        body {
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        img, svg {
            display: block;
            max-width: 100%;
        }
        a {
            text-decoration: none;
        }

        /*
         * parameter
         */
        :root {
            /* --lulliecat-background-color: #fef6e9; */
            --lulliecat-background-color: #f0f0f0;
            --lulliecat-background-color-dim: #f0f0f080;
            --lulliecat-sub-accent-color: #f5af77;
            --lulliecat-accent-color: #f3aa96;
            /* --lulliecat-main-color: #4f3235; */
            --lulliecat-main-color: #303030;
            --lulliecat-main-color-dim: #303030f0;
            --lulliecat-shadow-color: #c0c0c0;

            --lulliecat-header-height: 42px;
        }

        /*
         * grobal settings
         */
        :root {
            scroll-snap-type: y proximity;
            scroll-behavior: smooth;
        }

        body {
            /* decoration */
            /* font-family: "Roboto", "Zen Antique", "Noto Sans JP", serif; */
            font-family: "Roboto", "Noto Sans JP", serif;
            color: var(--lulliecat-main-color);
            background-color: var(--lulliecat-background-color);
        }

        section {
            /* layout - dimension */
            max-width: 1200px;
            margin-inline: auto;
            margin-block: 32px;
        }
        h2 {
            /* decoration */
            font-size: 64px;
            border-bottom: 8px solid;
            
            /* layout */
            margin-block-end: 32px;
        }

        /*
         * Hero
         */
         .hero {
            background-color: var(--lulliecat-main-color);
            /* layout - containing block for .hero > h1 */
            position: relative;

            /* clip for carousel scaling animation */
            overflow: clip;

            /* layout - dimension */
            width: 100%;
            height: 100vh;

            /* scroll */
            scroll-snap-align: start;
        }

        /* hero carousel */
        .hero > img {
            /* decoration */
            opacity: 0; /* for carousel animation */

            /* layout - dimension */
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;

            /* animation */
            animation: carousel 16s infinite;
        }
        .hero > img:nth-of-type(2) {
            animation-delay: 4s;
        }
        .hero > img:nth-of-type(3) {
            animation-delay: 8s;
        }
        .hero > img:nth-of-type(4) {
            animation-delay: 12s;
        }
        /* depends on the number of pictures */
        @keyframes carousel {
            0% {
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            25% {
                opacity: 1;
            }
            35% {
                opacity: 0;
                scale: 1.03;
            }
            100% {
                opacity: 0;
            }
        }

        /* hero text - site name */
        .site-name-1, .site-name-2 {
            /* decolation */
            font-size: 128px;
            font-weight: bold;

            /* layout - position respect to .hero */
            position: absolute;
            z-index: 1;
            left: 32px;
        }
        .site-name-1 {
            /* layout - position respect to .hero */
            bottom: 150px;

            /* animation */
            opacity: 0;
            animation: sitename ease-out 0.5s forwards 1s;
        }
        .site-name-2 {
            /* layout - position respect to .hero */
            bottom: 32px;

            /* animation */
            opacity: 0;
            animation: sitename ease-out 0.5s forwards 1.5s;
        }
        @keyframes sitename {
            0% {
                transform: translateY(32px);
            }
            100% {
                opacity: 1;
            }
        }

        /*
         * header
         */
        header {
            /* decolation */
            background-color: #f0f0f0c0;
            box-shadow: 0px 0px 10px var(--lulliecat-shadow-color);

            /* block type */
            display: flex;

            /* layout - position */
            position: sticky;
            top: 0;

            /* layout - dimension */
            width: 100%;
            height: var(--lulliecat-header-height);

            /* layout - alignment */
            align-items: baseline;
            justify-content: space-between;
        }
        header > h1 {
            /* decolation */
            font-size: 32px;
            font-weight: bold;
            border-bottom: none;

            /* layout - dimension */
            margin-left: 32px;
        }
        header > nav {
            /* decolation */
            font-weight: bold;

            /* layout - dimension */
            margin-right: 32px;
        }
        header > nav > ul {
            /* block type */
            display: flex;

            /* layout - dimension */
            gap: 24px;
        }
        header a {
            /* decolation */
            color: var(--lulliecat-main-color);
        }


        /*
         * musicvideo
         */
        .musicvideos {
            scroll-snap-align: start;
            scroll-margin-block-start: var(--lulliecat-header-height);
            margin-bottom: 100px;
        }
        .musicvideos img {
            width: 360px;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            padding: 0;
            border-radius: 8px;
            box-shadow: 0 0 10px var(--lulliecat-shadow-color);

            cursor: pointer;
        }
        .musicvideos > ul {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
        }

        .card {
            padding: 16px;
        }

        .card > input {
            display: none;
        }

        .card > iframe {
            display: none;
        }

        .player {
            display: none;
        }

        .player > label {
            cursor: pointer;
        }

        .card > input:checked ~ .player {
            display: flex;
            position: fixed;
            inset: 0;
            align-items: center;
            justify-content: center;

            background-color: var(--lulliecat-main-color-dim);
            color: var(--lulliecat-background-color);
        }

        .player > label {
            position: fixed;
            top: 0;
        }

        .player > iframe {
            width: 80vw;
            height: calc(80vw * 9 / 16);
        }


        /*
         * footer
         */
        footer {
            /* decoration */
            color: var(--lulliecat-background-color);
            background-color: var(--lulliecat-main-color);

            /* layout - position */
            position: fixed;
            bottom: 0;

            /* layout - dimension */
            width: 100%;
            padding: 4px;

            /* layout - alignment */
            text-align: center;
        }
    </style>
</head>
