    <style>
        /* reset css */
        * {
            margin: 0;
            padding: 0;
        }
        ul {
            list-style-type: none;
        }
        body {
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        img, svg {
            display: block;
            max-width: 100%;
        }
        a {
            text-decoration: none;
        }

        /*
         * parameter
         */
        :root {
            /* --lulliecat-background-color: #fef6e9; */
            --lulliecat-background-color: #f0f0f0;
            --lulliecat-background-color-dim: #f0f0f080;
            --lulliecat-sub-accent-color: #f5af77;
            --lulliecat-accent-color: #f3aa96;
            /* --lulliecat-main-color: #4f3235; */
            --lulliecat-main-color: #303030;
            --lulliecat-shadow-color: #c0c0c0;
        }

        /*
         * grobal settings
         */
        body {
            /* decoration */
            /* font-family: "Roboto", "Zen Antique", "Noto Sans JP", serif; */
            font-family: "Roboto", "Noto Sans JP", serif;
            color: var(--lulliecat-main-color);
            background-color: var(--lulliecat-background-color);
        }

        section {
            /* layout - dimension */
            max-width: 1200px;
            margin-inline: auto;
            margin-block: 32px;
        }
        h2 {
            /* decoration */
            font-size: 64px;
            border-bottom: 8px solid;
            
            /* layout */
            margin-block-end: 32px;
        }

        /*
         * Hero
         */
         .hero > img {
            /* layout - dimension */
            width: 100%;
            height: 100vh;
            object-fit: cover;
        }
        .hero {
            /* layout - containing block for .hero > h1 */
            position: relative;
        }
        .hero > h1 {
            /* decolation */
            font-size: 128px;
            line-height: 1.1;

            /* layout - position respect to .hero */
            position: absolute;
            bottom: 32px;
            left: 32px;
        }

        /*
         * header
         */
        header {
            /* decolation */
            background-color: #f0f0f0c0;
            box-shadow: 0px 0px 10px var(--lulliecat-shadow-color);

            /* block type */
            display: flex;

            /* layout - position */
            position: sticky;
            top: 0;

            /* layout - dimension */
            width: 100%;

            /* layout - alignment */
            align-items: baseline;
            justify-content: space-between;
        }
        header > h2 {
            /* decolation */
            font-size: 32px;
            font-weight: bold;
            border-bottom: none;

            /* layout - dimension */
            margin-left: 32px;
        }
        header > nav {
            /* decolation */
            font-weight: bold;

            /* layout - dimension */
            margin-right: 32px;
        }
        header > nav > ul {
            /* block type */
            display: flex;

            /* layout - dimension */
            gap: 16px;
        }
        header a {
            /* decolation */
            color: var(--lulliecat-main-color);
        }


        /*
         * musicvideo
         */
         .musicvideo img {
            width: 360px;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            padding: 0;
            border-radius: 8px;
            box-shadow: 0 0 10px var(--lulliecat-shadow-color);
        }
        .musicvideo > ul {
            /* display: flex; */
            /* overflow-x: scroll; */
            /* scroll-snap-type: x mandatory; */
        }

        .musicvideo > ul > li {
            flex-shrink: 0;
            /* scroll-snap-align: center; */
        }

        .musicvideo {
            margin-bottom: 100px;
        }



        /*
         * footer
         */
        footer {
            /* decoration */
            color: var(--lulliecat-background-color);
            background-color: var(--lulliecat-main-color);

            /* layout - position */
            position: fixed;
            bottom: 0;

            /* layout - dimension */
            width: 100%;
            padding: 4px;

            /* layout - alignment */
            text-align: center;
        }
