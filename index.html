    <title>lulliecat musics</title>
    <style>
        /* reset css */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        ul {
            list-style-type: none;
        }
        body {
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        img, svg {
            display: block;
            max-width: 100%;
        }
        a {
            text-decoration: none;
        }

        /*
         * parameter
         */
        :root {
            /* --lulliecat-background-color: #fef6e9; */
            --lulliecat-background-color: #f0f0f0;
            --lulliecat-background-color-dim: #f0f0f080;
            --lulliecat-sub-accent-color: #f5af77;
            --lulliecat-accent-color: #f3aa96;
            /* --lulliecat-main-color: #4f3235; */
            --lulliecat-main-color: #303030;
            --lulliecat-main-color-dim: #303030f0;
            --lulliecat-shadow-color: #c0c0c0;

            --lulliecat-header-height: 42px;
        }

        /*
         * grobal settings
         */
        body {
            /* decoration */
            /* font-family: "Roboto", "Zen Antique", "Noto Sans JP", serif; */
            font-family: "Roboto", "Noto Sans JP", serif;
            color: var(--lulliecat-main-color);
            background-color: var(--lulliecat-background-color);
        }

        section {
            /* layout - dimension */
            max-width: 1200px;
            margin-inline: auto;
            margin-block: 32px;
        }
        section > header {
            padding: 16px;
        }
        section > header > h2 {
            /* decoration */
            font-size: 64px;
            border-bottom: 8px solid;
            
            /* layout */
            /* margin-block-end: 32px; */
        }
        @media screen and (max-width: 700px) {
            section > header > h2 {
                font-size: 48px;
            }
        }
        /*
         * Hero
         */
         .hero {
            background-color: var(--lulliecat-main-color);
            /* layout - containing block for .hero > h1 */
            position: relative;

            /* clip for carousel scaling animation */
            overflow: clip;

            /* layout - dimension */
            width: 100%;
            height: 100vh;
        }

        /* hero carousel */
        .hero > img {
            /* decoration */
            opacity: 0; /* for carousel animation */

            /* layout - dimension */
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            object-fit: cover;

            /* animation */
            animation: carousel 16s infinite;
        }
        .hero > img:nth-of-type(2) {
            animation-delay: 4s;
        }
        .hero > img:nth-of-type(3) {
            animation-delay: 8s;
        }
        .hero > img:nth-of-type(4) {
            animation-delay: 12s;
        }
        /* depends on the number of pictures */
        @keyframes carousel {
            0% {
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            25% {
                opacity: 1;
            }
            35% {
                opacity: 0;
                scale: 1.03;
            }
            100% {
                opacity: 0;
            }
        }

        /* hero text - site name */
        .site-name-1, .site-name-2 {
            /* decolation */
            font-size: 128px;
            font-weight: bold;

            /* layout - position respect to .hero */
            position: absolute;
            z-index: 1;
            left: 32px;
        }
        .site-name-1 {
            /* layout - position respect to .hero */
            bottom: 166px;

            /* animation */
            opacity: 0;
            animation: sitename ease-out 0.5s forwards 1s;
        }
        .site-name-2 {
            /* layout - position respect to .hero */
            bottom: 48px;

            /* animation */
            opacity: 0;
            animation: sitename ease-out 0.5s forwards 1.5s;
        }
        @keyframes sitename {
            0% {
                transform: translateY(32px);
            }
            100% {
                opacity: 1;
            }
        }
        @media screen and (max-width: 700px) {
            .site-name-1 {
                bottom: 116px;
            }
            .site-name-1, .site-name-2 {
                font-size: 72px;
            }
        }

        /*
         * header
         */
        body > header {
            /* decolation */
            background-color: #f0f0f0c0;
            /* box-shadow: 0px 0px 10px var(--lulliecat-shadow-color); */

            /* block type */
            display: flex;

            /* layout - position */
            position: sticky;
            top: 0;

            /* layout - dimension */
            width: 100%;
            height: var(--lulliecat-header-height);

            /* layout - alignment */
            align-items: baseline;
            justify-content: space-between;
        }
        body > header > h1 {
            /* decolation */
            font-size: 32px;
            font-weight: bold;
            border-bottom: none;

            /* layout - dimension */
            margin-left: 16px;
        }
        body > header > nav {
            /* decolation */
            font-weight: bold;

            /* layout - dimension */
            margin-right: 16px;
        }
        body > header > nav > ul {
            /* block type */
            display: flex;

            /* layout - dimension */
            gap: 24px;
        }
        body > header a {
            /* decolation */
            color: var(--lulliecat-main-color);
        }
        @media screen and (max-width: 700px) {
            body > header > nav {
                display: none;
            }
        }


        /*
         * music videos
         */
        .musicvideos {
            scroll-margin-block-start: var(--lulliecat-header-height);
            margin-bottom: 100px;
        }
        .musicvideos img {
            aspect-ratio: 16 / 9;
            object-fit: cover;
            padding: 0;
            border-radius: 8px;
            box-shadow: 0 0 10px var(--lulliecat-shadow-color);

            cursor: pointer;
        }
        .musicvideos > ul {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
        }

        /* tag tabs */
        .tag-tabs {
            display: flex;
            position: relative;
            justify-content: flex-start;
            flex-wrap: wrap;
            column-gap: 16px;
            /* grid-template-columns: repeat(auto-fit, minmax(10px, 1fr)); */
            position: sticky;
            top: var(--lulliecat-header-height);
            padding: 16px;
            background-color: #f0f0f0c0;
        }
        .tag-tabs:has( input:checked ) > {
            background-color: #303030;
        }
        .tag-tabs > label > input {
            display: none;
        }
        .tag-tabs > label {
            margin-bottom: 8px;
        }
        .tag-tabs > label > p {
            cursor: pointer;
            border: 1px solid;
            border-radius: 4px;
            min-width: 60px;
            text-align: center;
            padding-inline: 8px;
            font-weight: bold;
        }
        .tag-tabs > .tabs-close {
            position: absolute;
            top: -16px;
            right: 16px;
        }
        .tag-tabs > label > input:checked + p {
            background-color: var(--lulliecat-main-color);
            color: var(--lulliecat-background-color);
        }
        .musicvideos:has( .tag-tabs #all:checked ) .card {
            display: block;
        }
        .musicvideos:has( .tag-tabs #close:checked ) .video-close,
        .musicvideos:has( .tag-tabs #recomended:checked ) .card:has( .tags .recomended ),
        .musicvideos:has( .tag-tabs #rock:checked ) .card:has( .tags .rock ),
        .musicvideos:has( .tag-tabs #anime:checked ) .card:has( .tags .anime ),
        .musicvideos:has( .tag-tabs #heavy-metal:checked ) .card:has( .tags .heavy-metal ),
        .musicvideos:has( .tag-tabs #prog-metal:checked ) .card:has( .tags .prog-metal ),
        .musicvideos:has( .tag-tabs #epic-metal:checked ) .card:has( .tags .epic-metal ),
        .musicvideos:has( .tag-tabs #death-metal:checked ) .card:has( .tags .death-metal ),
        .musicvideos:has( .tag-tabs #melodic-hardcore:checked ) .card:has( .tags .melodic-hardcore ),
        .musicvideos:has( .tag-tabs #doom-metal:checked ) .card:has( .tags .doom-metal ),
        .musicvideos:has( .tag-tabs #alternative-metal:checked ) .card:has( .tags .altanative-metal ),
        .musicvideos:has( .tag-tabs #vtuber:checked ) .card:has( .tags .vtuber ),
        .musicvideos:has( .tag-tabs #game:checked ) .card:has( .tags .game ),
        .musicvideos:has( .tag-tabs #symphonic-rock:checked ) .card:has( .tags .symphonic-rock )
        {
            display: block;
        }

        /* card */
        .card, .video-close {
            padding: 16px;

            /* for tabs */
            display: none;
        }
        .card > input {
            display: none;
        }
        .card .artist::before {
            content: " / ";
        }

        /* music videos main player */
        .mainplayer {
            display: flex;
            position: fixed;
            inset: 0;
            align-items: center;
            justify-content: center;
            z-index: 10;

            background-color: var(--lulliecat-main-color-dim);
            color: var(--lulliecat-background-color);
        }
        .mainplayer:has(> input:checked)  {
            display: none;
        }
        .mainplayer > iframe {
            width: min(100%, 1920px);
            aspect-ratio: 16 / 9;
        }
        .mainplayer > label {
            position: fixed;
            top: 0;
            cursor: pointer;
        }
        .mainplayer > input {
            display: none;
        }
        /* prevent background scroll when playing a video */
        /* it may not be worked on Safari */
        html {
            overflow: hidden;
        }
        html:has(.mainplayer input:checked) {
            overflow: auto;
        }


        /*
         * footer
         */
        footer {
            /* decoration */
            color: var(--lulliecat-background-color);
            background-color: var(--lulliecat-main-color);

            /* layout - position */
            position: fixed;
            bottom: 0;

            /* layout - dimension */
            width: 100%;
            padding: 4px;

            /* layout - alignment */
            text-align: center;
        }
    </style>

    <script>
        const cards         = document.querySelectorAll(".card");
        const player_label  = document.querySelector(".mainplayer > label");
        const player        = document.querySelector(".mainplayer > iframe");
        cards.forEach((card) => {
            const img_label = card.querySelector("figure > label");
            const id        = img_label.getAttribute("for");

            // open
            img_label.addEventListener('click', (e) => player.src = `https://www.youtube.com/embed/${id}`);

            // close
            player_label.addEventListener('click', (e) => player.src = "");
        });

    </script>
